name: Shanway Vault PR Check

on:
  pull_request:
    paths:
      - "vault/anchors/**"
      - ".github/workflows/vault-pr-check.yml"
      - "src/**"
      - "Cargo.toml"
  workflow_dispatch:

jobs:
  shanway-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify changed anchors
        shell: bash
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref || 'main' }} HEAD | grep '^vault/anchors/' || true)
          if [ -z "$CHANGED" ]; then
            echo "No changed anchors."
            exit 0
          fi
          while IFS= read -r file; do
            cargo run --bin aether-cli -- verify-anchor "$file"
          done <<< "$CHANGED"

      - name: Check all signatures
        run: cargo run --bin aether-cli -- verify-signatures vault/anchors/

      - name: Run Engine Pipeline on PR anchors
        run: cargo run --bin aether-cli -- pipeline-check --threshold 0.65

      - name: Post result as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.existsSync('shanway-report.json')
              ? fs.readFileSync('shanway-report.json', 'utf8')
              : '{"status":"no-report"}';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Shanway Verification Report\n\`\`\`json\n${report}\n\`\`\``
            });
